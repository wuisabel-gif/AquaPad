<svg width="560" height="160" viewBox="0 0 560 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AquaPad">
  <!-- self-contained badge so it reads on light and dark READMEs -->
  <rect x="1.5" y="1.5" width="557" height="157" rx="26" fill="#0B1220" stroke="#1E2A44" stroke-width="3"/>

  <!-- HUD / device tile icon -->
  <rect x="34" y="36" width="88" height="88" rx="20" fill="#16213A" stroke="#243353" stroke-width="2"/>

  <!-- telemetry wave -->
  <path d="M48 88 C 60 64, 72 64, 84 88 S 108 112, 120 88"
        fill="none" stroke="#36D399" stroke-width="6" stroke-linecap="round"/>
  <!-- depth baseline -->
  <line x1="46" y1="104" x2="110" y2="104" stroke="#2A3A5C" stroke-width="4" stroke-linecap="round"/>
  <!-- status dots -->
  <circle cx="52" cy="52" r="6" fill="#36D399"/>
  <circle cx="72" cy="52" r="6" fill="#F5A524"/>
  <circle cx="104" cy="52" r="6" fill="#EF4444"/>

  <!-- wordmark -->
  <text x="150" y="98" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-1">
    <tspan fill="#F8FAFC">Aqua</tspan><tspan fill="#36D399">Pad</tspan>
  </text>
  <text x="152" y="126" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="0.5" fill="#8B98B8">
    telemetry · mission · safety companion
  </text>
</svg>
